<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #1c1c1f;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-bottom: 20px; color: #00fff2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            padding: 10px;
            background: #2a2a30;
            border: 1px solid #3f3f46;
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #00fff2;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00fff2;
            border: none;
            color: #121214;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #00ccd4; }
        #formResponse { margin-top: 15px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Get in Touch</h2>
    <form id="contactForm">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required placeholder="Your Name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="4" required placeholder="How can we help?"></textarea>
        </div>
        <button type="submit">Send Message</button>
    </form>
    <div id="formResponse"></div>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const responseDiv = document.getElementById('formResponse');
        
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
        };

        try {
            // Points to your backend API route
            const response = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (response.ok) {
                responseDiv.style.color = '#4caf50';
                responseDiv.textContent = 'Message sent successfully!';
                document.getElementById('contactForm').reset();
            } else {
                throw new Error(result.message || 'Something went wrong.');
            }
        } catch (error) {
            responseDiv.style.color = '#f44336';
            responseDiv.textContent = error.message;
        }
    });
</script>
</body>
</html>
